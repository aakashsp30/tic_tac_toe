<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1 class="logo">TIC<span>TAC</span>TOE</h1>
        <p class="tagline">insert coin to play</p>
    </header>

    <div id="setup-screen" class="screen">
        <div class="setup-card">
            <h2>Enter Player Names</h2>
            <div class="player-inputs">
                <div class="input-group x-group">
                    <label for="name-x">✕ &nbsp;Player X</label>
                    <input type="text" id="name-x" placeholder="Player X" maxlength="16" autocomplete="off">
                </div>
                <div class="input-group o-group">
                    <label for="name-o">○ &nbsp;Player O</label>
                    <input type="text" id="name-o" placeholder="Player O" maxlength="16" autocomplete="off">
                </div>
            </div>
            <button id="btn-start" class="btn btn-primary">Start Game</button>
        </div>
    </div>

    <div id="game-screen" class="screen hidden">

        <div class="scoreboard">
            <div class="player-score" id="player-x-label">
                <span class="marker-badge">X</span>
                <span class="player-name">Player X</span>
                <span class="score-num" id="score-x">0</span>
            </div>
            <div class="score-divider"></div>
            <div class="player-score" id="player-o-label">
                <span class="marker-badge">O</span>
                <span class="player-name">Player O</span>
                <span class="score-num" id="score-o">0</span>
            </div>
        </div>

        <div class="board-wrap">
            <div class="board-grid">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>

            <svg class="win-line-svg" id="win-line-svg" xmlns="http://www.w3.org/2000/svg">
                <line id="win-line" x1="0" y1="0" x2="0" y2="0" />
            </svg>
        </div>

        <div class="status-bar">
            <p id="status-message"></p>
        </div>

        <div class="action-row">
            <button id="btn-next-round" class="btn btn-secondary hidden">Next Round</button>
            <button id="btn-restart" class="btn btn-ghost">↩ Restart</button>
        </div>
    </div>
</body>
</html>
